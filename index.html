<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Eğitim Karargahı | Giriş</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --border: rgba(255, 255, 255, 0.3);
            --accent: #4facfe;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://source.unsplash.com/1600x900/?education,space') no-repeat center center fixed;
            background-size: cover;
        }

        /* Glassmorphism Panel */
        .main-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            text-align: center;
            transition: 0.5s;
        }

        h2 { margin-bottom: 20px; font-weight: 400; letter-spacing: 1px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        
        label { font-size: 13px; margin-left: 5px; opacity: 0.9; }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.85);
            box-sizing: border-box;
            outline: none;
            color: #333;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .options-row a { color: white; text-decoration: none; opacity: 0.8; }
        .options-row a:hover { opacity: 1; text-decoration: underline; }

        .btn-primary {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white; border: none; padding: 14px;
            border-radius: 12px; width: 100%; cursor: pointer;
            font-weight: bold; font-size: 15px; margin-bottom: 10px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white; border: 1px solid var(--border);
            padding: 10px; border-radius: 12px; width: 100%;
            cursor: pointer; font-size: 13px;
        }

        /* Seviye Tespit Ekranı (Gizli başlar) */
        #seviye-tespit { display: none; }

        .blurred { filter: blur(20px); pointer-events: none; }
    </style>
</head>
<body>

    <div class="main-card" id="login-container">
        <h2>Karargah Girişi</h2>
        
        <div class="input-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Araştırmacı adın...">
        </div>

        <div class="input-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="Parolanız...">
        </div>

        <div class="options-row">
            <label><input type="checkbox"> Beni Hatırla</label>
            <a href="#" onclick="alert('Şifre sıfırlama talebiniz yöneticiye iletildi.')">Şifremi Unuttum</a>
        </div>

        <button class="btn-primary" onclick="normalGiris()">Sisteme Gir</button>
        <button class="btn-secondary" onclick="karekodGiris()">Karekod ile Başla</button>
        
        <p style="font-size: 11px; margin-top: 15px; opacity: 0.7;">
            Her araştırmacı kendi yolculuğunun mimarıdır.
        </p>
    </div>

    <div class="main-card" id="seviye-tespit">
        <h3>Seviye Tespit Alanı</h3>
        <p style="font-size: 14px;">Hoş geldin araştırmacı! Karargaha katılmadan önce senin seviyeni birlikte keşfedelim.</p>
        
        <div class="id-card" style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin: 15px 0;">
            <p><strong>Soru:</strong> 10'dan önce hangi sayı gelir?</p>
            <input type="text" id="level-ans" placeholder="Cevabınız...">
        </div>

        <button class="btn-primary" onclick="seviyeTamamla()">Testi Bitir ve Giriş Yap</button>
    </div>

    <script>
        function normalGiris() {
            const user = document.getElementById('username').value;
            if(user) {
                alert("Harika! " + user + ", karargah yükleniyor...");
                // Menü açılma efekti için arka planı bulandırıyoruz
                document.body.classList.add('blurred');
            } else {
                alert("Seni tanıyabilmemiz için bir isim girer misin?");
            }
        }

        function karekodGiris() {
            // Giriş panelini gizle, seviye tespiti göster
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('seviye-tespit').style.display = 'block';
        }

        function seviyeTamamla() {
            const ans = document.getElementById('level-ans').value;
            if(ans === "9" || ans.toLowerCase() === "dokuz") {
                alert("Seviye tespiti başarıyla tamamlandı. Giriş ekranına yönlendiriliyorsun.");
                document.getElementById('seviye-tespit').style.display = 'none';
                document.getElementById('login-container').style.display = 'block';
            } else {
                alert("Bu cevabı birlikte tekrar inceleyebiliriz, denemeye devam et!");
            }
        }
    </script>
</body>
</html>
