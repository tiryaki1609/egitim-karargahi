<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Eğitim Karargahı - Giriş</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* Glassmorphism Panel */
        .login-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 350px;
        }

        h2 { color: #ffffff; margin-bottom: 20px; font-weight: 500; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        
        label { color: #ffffff; display: block; margin-bottom: 5px; font-size: 14px; }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
            outline: none;
        }

        .bot-protection {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            color: #ffffff;
        }

        .btn-enter {
            background: #4facfe;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-enter:hover { background: #00f2fe; }
    </style>
</head>
<body>

    <div class="login-panel">
        <h2>555Karargah Girişi</h2>
        
        <div class="input-group">
            <label>Araştırmacı Adı:</label>
            <input type="text" id="username" placeholder="İsmini yaz...">
        </div>

        <div class="bot-protection">
            <p style="margin: 0 0 10px 0; font-size: 14px;">Güvenlik Sorusu:</p>
            <p><strong>Dört elmam vardı, üç tane daha geldi. Kaç oldu?</strong></p>
            <input type="text" id="bot-answer" placeholder="Cevabı yazıyla giriniz">
        </div>

        <button class="btn-enter" onclick="validateLogin()">Sisteme Eriş</button>
    </div>

    <script>
        function validateLogin() {
            const user = document.getElementById('username').value.trim();
            const answer = document.getElementById('bot-answer').value.toLowerCase().trim();

            if (user === "") {
                alert("Lütfen ismini bizimle paylaşır mısın?");
                return;
            }

            if (answer === "yedi") {
                alert("Harikasın " + user + "! Karargaha başarıyla ulaştın.");
                // Burada ana sayfaya yönlendirme yapılabilir
            } else {
                alert("Bu adımı birlikte tekrar deneyelim mi? Doğru cevabı bulacağına eminim.");
            }
        }
    </script>
</body>
</html>
