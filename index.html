<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dijital Eğitim Karargahı | Giriş</title>
    <style>
        /* Tam Ekran ve Arka Plan Ayarları */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow-x: hidden;
        }

        /* Responsive (Duyarlı) Cam Panel */
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 30px;
            /* Genişlik Ayarı: Telefondan Bilgisayara Otomatik Uyum */
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: #ffffff;
            box-sizing: border-box;
        }

        h2 { 
            margin-bottom: 25px; 
            font-weight: 600; 
            font-size: clamp(1.2rem, 5vw, 1.8rem); /* Ekran boyutuna göre başlık büyür/küçülür */
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            color: #333;
        }

        /* Alt Seçenekler Satırı */
        .extras {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 20px;
            flex-wrap: wrap; /* Dar ekranlarda alt alta geçer */
            gap: 10px;
        }

        .extras a { color: #fff; text-decoration: none; opacity: 0.8; }

        /* Buton Tasarımları */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn:hover { transform: scale(1.02); }

        /* Tablet ve Telefonlar için Ekstra Ayarlar */
        @media (max-width: 480px) {
            .login-card { padding: 20px; }
            h2 { margin-bottom: 15px; }
            input { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Karargah Girişi</h2>
        
        <div class="input-group">
            <label>Araştırmacı Adı</label>
            <input type="text" placeholder="Adınızı yazınız...">
        </div>

        <div class="input-group">
            <label>Gizli Şifre</label>
            <input type="password" placeholder="Şifrenizi yazınız...">
        </div>

        <div class="extras">
            <label style="cursor: pointer;"><input type="checkbox"> Beni Hatırla</label>
            <a href="#">Şifremi Unuttum</a>
        </div>

        <button class="btn btn-primary">Sisteme Giriş Yap</button>
        <button class="btn btn-secondary" onclick="alert('QR Okuyucu Açılıyor...')">Karekod ile Başla</button>
        
        <p style="font-size: 11px; margin-top: 15px; opacity: 0.7;">
            Her araştırmacı kendi yolculuğunun mimarıdır.
        </p>
    </div>

</body>
</html>
