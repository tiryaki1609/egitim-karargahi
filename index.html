<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dijital Eğitim Karargahı | Keşif Kapısı</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
        }

        /* Glassmorphism Panel */
        .discovery-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: clamp(20px, 5vw, 40px);
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: #ffffff;
            box-sizing: border-box;
        }

        h2 { 
            color: #ffffff !important; 
            font-size: clamp(1.4rem, 6vw, 2rem);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .pedagog-note {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 25px;
            line-height: 1.4;
            color: #e0f2f1;
        }

        .field-group { text-align: left; margin-bottom: 15px; }
        
        label { 
            display: block; color: #ffffff !important; 
            font-size: 13px; margin-bottom: 5px; margin-left: 5px;
        }

        input {
            width: 100%; padding: 14px;
            background: rgba(255, 255, 255, 0.95) !important;
            border: none; border-radius: 15px;
            font-size: 16px; color: #2c3e50 !important;
            box-sizing: border-box; outline: none;
        }

        .action-row {
            display: flex; justify-content: space-between;
            font-size: 12px; margin: 15px 5px 25px;
        }
        
        .action-row a { color: #ffffff; text-decoration: none; opacity: 0.8; }

        .btn-discovery {
            width: 100%; padding: 16px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white !important; border: none; border-radius: 20px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .btn-discovery:active { transform: scale(0.96); }

        .btn-qr {
            margin-top: 15px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3); font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="discovery-card">
        <h2>Keşif Kapısı</h2>
        
        <div class="pedagog-note">
            "Her adım yeni bir öğrenme yolculuğudur. Karargaha hoş geldin araştırmacı!"
        </div>
        
        <div class="field-group">
            <label>Araştırmacı Adı</label>
            <input type="text" placeholder="İsmini bizimle paylaşır mısın?">
        </div>

        <div class="field-group">
            <label>Gizli Anahtar (Şifre)</label>
            <input type="password" placeholder="Şifreni buraya yazabilirsin">
        </div>

        <div class="action-row">
            <label style="cursor:pointer;"><input type="checkbox"> Beni Tanı</label>
            <a href="#">Şifremi Hatırlat</a>
        </div>

        <button class="btn-discovery">Maceraya Başla</button>
        <button class="btn-discovery btn-qr" onclick="alert('Yeni bir seviye keşfediliyor...')">Karekod ile Seviye Tespit</button>
        
        <p style="font-size: 11px; margin-top: 25px; opacity: 0.7; font-style: italic;">
            Senin gelişimin, bizim en büyük mutluluğumuz.
        </p>
    </div>

</body>
</html>
